# Launch configuration
# Edit paths and topic names here to match your system.

# Output directory for saved data (data_saver_launch)
output_dir: /home/airlab/dataset/airlab_3dgs/test2

# Output directory for rosbag recordings (record_bag_launch)
bag_output_dir: /home/airlab/dataset/isaacsim

# ROS topic names
lidar_topic: /isaacsim/lidar
odom_topic: /isaacsim/odom
image_topic: /isaacsim/rgb

# Image saving
image_save_interval: 10   # save every Nth image
image_prefix: frame

# Odometry saving
odom_save_interval: 1     # save every Nth odometry message

# Point cloud parameters
leaf_size: 0.03           # voxel downsampling leaf size (metres)
max_path_length: 10000    # max number of poses kept in path

# TF frame
frame_id: World
